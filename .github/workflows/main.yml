name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 60   # enough time

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------- System dependencies ----------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev

      # ---------- Python 3.11 ----------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.8'

      # ---------- Install Buildozer & p4a ----------
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          pip install 'p4a<2025.0.0'

      # ---------- Setup Android SDK & NDK (cached via action) ----------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2
          ndk: 25.1.8937393   # matches android.ndk = 25b
          cmake: 3.22.1

      # ---------- Cache Buildozer global dir (for future runs) ----------
      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ---------- Build APK ----------
      - name: Build with Buildozer
        run: |
          # ANDROID_HOME and NDK path are set by setup-android action
          # Buildozer will find them automatically
          buildozer -v android debug

      # ---------- Upload APK ----------
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: blechat-apk
          path: bin/*.apk
